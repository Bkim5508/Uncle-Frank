<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Uncle Frank</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    #app{display:flex;height:620px;width:860px;max-width:100vw;border:0.5px solid #B8D4EE;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
    #app.app-hidden{display:none!important;}
    #sidebar{width:260px;min-width:260px;border-right:0.5px solid #B8D4EE;display:flex;flex-direction:column;background:linear-gradient(180deg,#EAF4FF 0%,#D4E9F7 60%,#C8E0F2 100%);}
    #logo-area{padding:16px 14px 14px;display:flex;justify-content:center;}
    #tab-row{display:flex;padding:0 20px;gap:8px;}
    .tab-btn{flex:1;padding:8px 0;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;background:transparent;color:#5A7A96;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
    .tab-btn.active{color:#C84828;border-bottom-color:#C84828;}
    .tab-btn i{font-size:14px;}
    #list-area{flex:1;overflow-y:auto;}
    .item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:0.5px solid rgba(100,160,210,0.25);transition:background 0.1s;}
    .item:hover{background:rgba(255,255,255,0.6);}
    .item.active{background:rgba(255,255,255,0.75);}
    .new-group-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:0.5px solid rgba(100,160,210,0.25);transition:background 0.1s;}
    .new-group-btn:hover{background:rgba(255,255,255,0.6);}
    .plus-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:rgba(255,255,255,0.7);border:1.5px dashed #8BBAD8;color:#C84828;}
    .info{flex:1;min-width:0;}
    .nm{font-size:13px;font-weight:500;color:#1A3A52;}
    .pr{font-size:11px;color:#4A7090;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .st{font-size:11px;color:#5A8AAA;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .tm{font-size:10px;color:#6A9AB8;}
    .badge{background:#C84828;color:#fff;font-size:10px;font-weight:500;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;}
    .dot-on{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4CAF50;margin-right:5px;vertical-align:middle;}
    .dot-off{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9ABCD0;margin-right:5px;vertical-align:middle;}
    #my-profile-bar{padding:10px 14px;border-top:0.5px solid rgba(100,160,210,0.35);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s;}
    #my-profile-bar:hover{background:rgba(255,255,255,0.6);}
    #main{flex:1;display:flex;flex-direction:column;background:#fff;}
    #msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#F7F7F7;}
    .mr{display:flex;gap:8px;align-items:flex-end;}
    .mr.me{flex-direction:row-reverse;}
    .mav{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .mc{display:flex;flex-direction:column;gap:2px;max-width:60%;}
    .mr.me .mc{align-items:flex-end;}
    .sn{font-size:10px;color:#888;padding:0 4px;}
    .bl{padding:8px 12px;font-size:13px;line-height:1.5;color:#222;background:#fff;border:0.5px solid #ddd;border-radius:4px 16px 16px 16px;}
    .mr.me .bl{background:#C84828;color:#fff;border-color:#C84828;border-radius:16px 4px 16px 16px;}
    .mt{font-size:10px;color:#aaa;padding:0 4px;}
    .dv{text-align:center;font-size:11px;color:#aaa;background:rgba(0,0,0,0.06);border-radius:12px;padding:3px 10px;align-self:center;}
    #inp-area{padding:10px 12px;border-top:0.5px solid #eee;display:flex;align-items:center;gap:8px;background:#fff;}
    #msg-in{flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:20px;font-size:13px;font-family:inherit;background:#f5f5f5;color:#222;outline:none;height:36px;}
    #msg-in:focus{border-color:#C84828;}
    .ib{position:relative;width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;font-size:18px;}
    .ib:hover{background:#f0f0f0;}
    #send-btn{width:36px;height:36px;border-radius:50%;border:none;background:#C84828;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
    #send-btn:hover{opacity:0.85;}
    .chk-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:0.5px solid rgba(100,160,210,0.25);transition:background 0.1s;}
    .chk-item:hover{background:rgba(255,255,255,0.5);}
    .chk-box{width:20px;height:20px;border-radius:6px;border:1.5px solid #8ABCD0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .chk-box.on{background:#C84828;border-color:#C84828;color:#fff;}
    .action-btn{padding:11px 0;background:#C84828;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;width:100%;}
    .action-btn:disabled{background:#ddd;color:#aaa;cursor:not-allowed;}
    .rename-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:0.5px solid #eee;background:#f5f5f5;}
    .rename-bar input{flex:1;padding:7px 10px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#222;outline:none;}
    .rename-bar input:focus{border-color:#C84828;}
    .rename-bar button{padding:7px 14px;background:#C84828;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
    .photo-wrap{position:relative;display:inline-block;cursor:pointer;}
    .photo-overlay{position:absolute;bottom:0;left:0;right:0;height:36px;background:rgba(0,0,0,0.45);border-radius:0 0 24px 24px;display:flex;align-items:center;justify-content:center;gap:4px;color:#fff;font-size:11px;}
    .tooltip{position:relative;}
    .tooltip::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.88);color:#fff;font-size:11px;white-space:nowrap;padding:4px 8px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:300;}
    .tooltip:hover::after{opacity:1;}
    .dropdown{position:relative;}
    .dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:0.5px solid #eee;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.12);min-width:150px;z-index:200;overflow:hidden;}
    .dropdown-menu.open{display:block;}
    .dropdown-item{padding:9px 14px;font-size:13px;color:#222;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s;}
    .dropdown-item:hover{background:#f5f5f5;}
    .dropdown-item.danger{color:#C84828;}
    .dropdown-divider{height:0.5px;background:#eee;}
    /* mobile helpers — hidden on desktop */
    .mobile-back-btn{display:none;}
    .mobile-header{display:none;align-items:center;padding:10px 14px;border-bottom:0.5px solid #eee;background:#fff;flex-shrink:0;}
    /* =================== MOBILE =================== */
    @media screen and (max-width:768px){
      body{align-items:flex-start;background:#fff;}
      /* 로그인 화면 */
      #login-screen>div{width:90%!important;max-width:360px;}
      /* 앱 컨테이너: 좌우 분할 없애고 전체화면 단독 표시 */
      /* bottom은 지정하지 않고 height로만 크기 제어 — JS(visualViewport)로 키보드 높이 반영 가능 */
      #app{
        display:block!important;
        position:fixed!important;
        top:0!important;left:0!important;right:0!important;
        width:100vw!important;max-width:100vw!important;
        height:100vh;height:100dvh;
        border-radius:0!important;border:none!important;box-shadow:none!important;
        overflow:hidden!important;
      }
      /* 사이드바 / 메인: 각각 전체화면으로 겹쳐 쌓고, transform으로 슬라이드 전환 */
      #sidebar,#main{
        position:absolute!important;
        top:0!important;left:0!important;right:0!important;bottom:0!important;
        width:100%!important;min-width:0!important;height:100%!important;
        display:flex!important;flex-direction:column!important;
        transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
        overflow:hidden!important;
        will-change:transform;
      }
      /* 기본: 사이드바(목록) 화면에 표시, 메인(채팅) 오른쪽 밖에 숨김 */
      #sidebar{transform:translateX(0)!important;z-index:2;border-right:none!important;}
      #main{transform:translateX(100%)!important;z-index:1;}
      /* 채팅방 열림: 사이드바 왼쪽으로 퇴장, 메인 등장 */
      #app.mobile-chat #sidebar{transform:translateX(-100%)!important;}
      #app.mobile-chat #main{transform:translateX(0)!important;}
      /* 메시지 목록: flex 자식의 min-height:0 이 없으면 overflow 제한이 안 걸림 */
      #msgs{flex:1!important;min-height:0!important;overflow-y:auto!important;}
      /* 헤더·입력창: 압축되지 않도록 고정 */
      #inp-area{
        flex-shrink:0!important;
        padding:10px 12px!important;
        padding-bottom:max(10px,env(safe-area-inset-bottom))!important;
      }
      .rename-bar{flex-shrink:0!important;}
      /* 터치 친화적 크기 */
      .item,.new-group-btn,.chk-item{padding:12px 14px;min-height:60px;}
      .tab-btn{padding:12px 0;min-height:44px;font-size:13px;}
      .ib,#send-btn{width:44px;height:44px;font-size:20px;flex-shrink:0;}
      #msg-in{height:44px;font-size:15px;padding:8px 14px;}
      #my-profile-bar{padding:14px;min-height:60px;}
      .nm{font-size:14px;}
      .pr,.st{font-size:12px;}
      .dropdown-item{padding:12px 14px;font-size:14px;min-height:44px;}
      .action-btn{padding:14px 0;font-size:15px;}
      /* 모바일 전용 요소 표시 */
      .mobile-back-btn{display:flex!important;}
      .mobile-header{display:flex!important;}
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" style="position:fixed;inset:0;background:linear-gradient(180deg,#EAF4FF 0%,#D4E9F7 60%,#C8E0F2 100%);display:flex;align-items:center;justify-content:center;z-index:1000;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:24px;width:300px;">
    <svg width="220" height="64" viewBox="0 0 280 160" aria-label="Uncle Frank 로고">
      <path d="M52 52 Q80 24 108 44" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round"/>
      <path d="M172 44 Q200 24 228 52" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round"/>
      <path d="M48 92 Q140 136 232 92" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round"/>
      <text x="140" y="148" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="30" fill="#C84828" letter-spacing="1">Uncle Frank</text>
    </svg>
    <div style="width:100%;background:rgba(255,255,255,0.65);border-radius:16px;padding:24px 20px;display:flex;flex-direction:column;gap:12px;border:0.5px solid #B8D4EE;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
      <p style="font-size:13px;color:#5A7A96;text-align:center;margin:0;">이름을 입력하고 입장하세요</p>
      <input id="login-name-input" type="text" placeholder="이름" maxlength="12"
        style="padding:10px 14px;border:0.5px solid #B8D4EE;border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:#222;outline:none;text-align:center;"/>
      <button onclick="doLogin()" style="padding:11px;background:#C84828;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;">입장하기</button>
    </div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*" style="display:none"/>

<div id="app" class="app-hidden">
  <div id="sidebar">
    <div id="logo-area">
      <svg width="148" height="42" viewBox="0 0 280 160" aria-label="Uncle Frank 로고" role="img">
        <path d="M52 52 Q80 24 108 44" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round"/>
        <path d="M172 44 Q200 24 228 52" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round"/>
        <path d="M48 92 Q140 136 232 92" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round"/>
        <text x="140" y="148" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="30" fill="#C84828" letter-spacing="1">Uncle Frank</text>
      </svg>
    </div>
    <div id="tab-row">
      <button class="tab-btn active" id="tab-f" onclick="switchTab('f')"><i class="ti ti-users"></i>친구</button>
      <button class="tab-btn" id="tab-c" onclick="switchTab('c')"><i class="ti ti-message-2"></i>대화</button>
    </div>
    <div id="list-area"></div>
    <div id="my-profile-bar" onclick="showMyProfile()">
      <div id="bottom-av" style="width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;border:0.5px solid rgba(100,160,210,0.4);display:flex;align-items:center;justify-content:center;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:500;color:#1A3A52" id="my-name-bar">내 프로필</div>
        <div style="font-size:11px;color:#5A8AAA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="my-status-bar">상태 메시지 설정하기</div>
      </div>
      <i class="ti ti-chevron-right" style="font-size:16px;color:#7AAAC0"></i>
    </div>
  </div>
  <div id="main">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#aaa;font-size:13px;">
      <svg width="64" height="46" viewBox="0 0 280 160">
        <path d="M52 52 Q80 24 108 44" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
        <path d="M172 44 Q200 24 228 52" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
        <path d="M48 92 Q140 136 232 92" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
      </svg>
      <span>친구를 눌러보세요</span>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = null;
var CLR = ['#A8E6CF','#FFD3B6','#D4A5D5','#85C1E9','#F9A7B0','#B8D4A8'];
var me = { name: '', status: 'Uncle Frank 사용 중 😄', photo: null };
var friends = [];
var chats = [];
var activeId = null, curTab = 'f', nextId = 1, selected = [], renamingId = null;

var UF_SVG = '<svg width="55%" height="40%" viewBox="0 0 280 160" style="display:block;margin:auto;"><path d="M52 52 Q80 24 108 44" fill="none" stroke="#C84828" stroke-width="14" stroke-linecap="round"/><path d="M172 44 Q200 24 228 52" fill="none" stroke="#C84828" stroke-width="14" stroke-linecap="round"/><path d="M48 92 Q140 136 232 92" fill="none" stroke="#C84828" stroke-width="14" stroke-linecap="round"/></svg>';

function isMobile(){return window.innerWidth<=768;}
function enterMobileChat(){if(isMobile())document.getElementById('app').classList.add('mobile-chat');}
function goBack(){document.getElementById('app').classList.remove('mobile-chat');activeId=null;renderList();showEmpty();}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ufAv(sz,rad,photo){sz=sz||40;rad=rad||'12px';var b='width:'+sz+'px;height:'+sz+'px;border-radius:'+rad+';flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;';if(photo)return '<div style="'+b+'"><img src="'+photo+'" style="width:100%;height:100%;object-fit:cover;"/></div>';return '<div style="'+b+'background:#fff;border:0.5px solid rgba(100,160,210,0.4);">'+UF_SVG+'</div>';}
function groupAv(sz,rad){sz=sz||40;rad=rad||'12px';return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+rad+';background:rgba(200,228,245,0.7);border:0.5px solid rgba(100,160,210,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-users" style="font-size:'+Math.round(sz*0.45)+'px;color:#5A8AAA;"></i></div>';}
function chatAv(c,sz,rad){return c.avatarType==='group'?groupAv(sz,rad):ufAv(sz,rad,null);}
function updateBottomAv(){var el=document.getElementById('bottom-av');if(!el)return;el.innerHTML=me.photo?'<img src="'+me.photo+'" style="width:100%;height:100%;object-fit:cover;"/>':UF_SVG;}

// --- 로그인 ---
document.addEventListener('DOMContentLoaded', function() {
  var loginInput = document.getElementById('login-name-input');
  if (loginInput) loginInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
});

function doLogin() {
  var input = document.getElementById('login-name-input');
  var name = input.value.trim();
  if (!name) { input.focus(); return; }

  me.name = name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('app-hidden');
  document.getElementById('my-name-bar').textContent = name;
  document.getElementById('my-status-bar').textContent = me.status;

  socket = io();

  socket.on('users_updated', function(onlineUsers) {
    var colorMap = {};
    friends.forEach(function(f) { colorMap[f.name] = f.color; });
    friends = onlineUsers
      .filter(function(n) { return n !== me.name; })
      .map(function(n, i) {
        return { name: n, color: colorMap[n] || CLR[i % CLR.length], photo: null };
      });
    renderList();
  });

  socket.on('room_list', function(roomList) {
    roomList.forEach(function(r) {
      if (chats.find(function(c) { return c.roomId === r.roomId; })) return;
      var memberNames = r.members.filter(function(n) { return n !== me.name; });
      chats.push(makeChat(r.roomId, r.type, r.type === 'dm' ? (memberNames[0] || '알 수 없음') : r.name, memberNames, r.messages));
    });
    renderList();
  });

  socket.on('room_created', function(data) {
    var existing = chats.find(function(c) { return c.roomId === data.roomId; });
    if (existing) {
      switchToChat(existing);
      return;
    }
    var memberNames = data.members.filter(function(n) { return n !== me.name; });
    var nc = makeChat(data.roomId, data.type, data.roomName, memberNames, data.messages || []);
    chats.unshift(nc);
    switchToChat(nc);
  });

  socket.on('room_invited', function(data) {
    if (chats.find(function(c) { return c.roomId === data.roomId; })) return;
    var memberNames = data.members.filter(function(n) { return n !== me.name; });
    var nc = makeChat(data.roomId, data.type, data.roomName, memberNames, data.messages || []);
    nc.unread = 1;
    chats.unshift(nc);
    renderList();
  });

  socket.on('message_received', function(data) {
    var c = chats.find(function(ch) { return ch.roomId === data.roomId; });
    if (!c) return;
    c.messages.push({ s: data.sender === me.name ? 'me' : data.sender, t: data.text, time: data.time });
    if (activeId === c.id) {
      renderChat(c);
    } else {
      c.unread = (c.unread || 0) + 1;
      renderList();
    }
  });

  socket.emit('login', name);
  updateBottomAv();
  renderList();
}

function makeChat(roomId, type, name, memberNames, rawMessages) {
  return {
    id: nextId++,
    roomId: roomId,
    type: type,
    name: name,
    friendName: type === 'dm' ? name : null,
    avatarType: type === 'dm' ? 'uf' : 'group',
    color: CLR[chats.length % CLR.length],
    members: memberNames,
    unread: 0,
    messages: rawMessages.map(function(m) {
      return { s: m.sender === me.name ? 'me' : m.sender, t: m.text, time: m.time };
    })
  };
}

function switchToChat(c) {
  curTab = 'c';
  activeId = c.id;
  c.unread = 0;
  document.getElementById('tab-f').className = 'tab-btn';
  document.getElementById('tab-c').className = 'tab-btn active';
  renderList();
  renderChat(c);
}

// --- 탭 / 네비게이션 ---
document.addEventListener('click', function(e) {
  var m = document.getElementById('more-menu'), b = document.getElementById('more-btn');
  if (m && b && !m.contains(e.target) && !b.contains(e.target)) m.classList.remove('open');
});
function toggleMoreMenu() { var m = document.getElementById('more-menu'); if (m) m.classList.toggle('open'); }

function switchTab(t) {
  document.getElementById('app').classList.remove('mobile-chat');
  curTab = t; activeId = null;
  document.getElementById('tab-f').className = 'tab-btn' + (t === 'f' ? ' active' : '');
  document.getElementById('tab-c').className = 'tab-btn' + (t === 'c' ? ' active' : '');
  renderList(); showEmpty();
}

function showEmpty() {
  document.getElementById('main').innerHTML = '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#aaa;font-size:13px;"><svg width="64" height="46" viewBox="0 0 280 160"><path d="M52 52 Q80 24 108 44" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round" opacity="0.2"/><path d="M172 44 Q200 24 228 52" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round" opacity="0.2"/><path d="M48 92 Q140 136 232 92" fill="none" stroke="#C84828" stroke-width="8" stroke-linecap="round" opacity="0.2"/></svg><span>' + (curTab === 'f' ? '친구를 눌러보세요' : '대화방을 선택해 보세요') + '</span></div>';
}

function renderList() {
  var area = document.getElementById('list-area');
  if (!area) return;
  var html = '';
  if (curTab === 'f') {
    if (friends.length === 0) {
      html = '<div style="padding:32px 16px;text-align:center;color:#7AAAC0;font-size:12px;">아직 접속한 친구가 없어요<br/>친구에게 링크를 공유해보세요 👋</div>';
    } else {
      friends.forEach(function(f, i) {
        html += '<div class="item' + (activeId === i ? ' active' : '') + '" onclick="showProfile(' + i + ')">' + ufAv(40, '12px', f.photo) + '<div class="info"><div class="nm">' + esc(f.name) + '</div><div class="st"><span class="dot-on"></span>온라인</div></div></div>';
      });
    }
  } else {
    html += '<div class="new-group-btn" onclick="showNewGroup()"><div class="plus-av"><i class="ti ti-users-plus"></i></div><div class="info"><div class="nm" style="color:#C84828">새 단체 대화 만들기</div><div class="pr">친구들을 초대해보세요</div></div></div>';
    chats.forEach(function(c) {
      var last = c.messages[c.messages.length - 1], preview = '';
      if (last) {
        if (last.s === 'me') preview = '나: ' + last.t;
        else if (c.type === 'group') preview = last.s + ': ' + last.t;
        else preview = last.t;
      }
      html += '<div class="item' + (activeId === c.id ? ' active' : '') + '" onclick="openChat(' + c.id + ')">' + chatAv(c, 40, '12px') + '<div class="info"><div class="nm">' + esc(c.name) + (c.type === 'group' ? ' (' + (c.members.length + 1) + ')' : '') + '</div><div class="pr">' + esc(preview) + '</div></div><div class="meta"><span class="tm">' + (last ? last.time : '') + '</span>' + (c.unread > 0 ? '<span class="badge">' + c.unread + '</span>' : '') + '</div></div>';
    });
  }
  area.innerHTML = html;
}

// --- 단체 대화 ---
function showNewGroup() {
  selected = [];
  var html = '<div style="display:flex;flex-direction:column;height:100%;"><div style="padding:14px 16px;border-bottom:0.5px solid #eee;display:flex;align-items:center;gap:10px;background:#fff;"><button class="ib" onclick="switchTab(\'c\')"><i class="ti ti-arrow-left"></i></button><div style="flex:1;font-size:14px;font-weight:500;color:#222;">단체 대화 만들기</div></div><div style="padding:12px 16px;border-bottom:0.5px solid #eee;background:#fff;"><input id="grp-name" type="text" placeholder="대화방 이름 입력 (선택)" style="width:100%;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#f5f5f5;color:#222;outline:none;"/></div>';
  if (friends.length === 0) {
    html += '<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:#aaa;">접속한 친구가 없어요</div>';
  } else {
    html += '<div style="padding:10px 16px 6px;font-size:11px;color:#5A8AAA;background:linear-gradient(180deg,#EAF4FF,#D4E9F7);">초대할 친구 선택</div><div style="flex:1;overflow-y:auto;background:linear-gradient(180deg,#EAF4FF,#D4E9F7);">';
    friends.forEach(function(f, i) {
      html += '<div class="chk-item" onclick="toggleSelect(' + i + ')" id="chk-' + i + '">' + ufAv(36, '10px', f.photo) + '<div class="info"><div class="nm">' + esc(f.name) + '</div><div class="st"><span class="dot-on"></span>온라인</div></div><div class="chk-box" id="chkbox-' + i + '"></div></div>';
    });
    html += '</div>';
  }
  html += '<div style="padding:12px 16px;border-top:0.5px solid #eee;background:#fff;"><button class="action-btn" id="make-btn" onclick="makeGroup()" disabled>대화방 만들기</button></div></div>';
  document.getElementById('main').innerHTML = html;
  enterMobileChat();
}

function toggleSelect(i) {
  var idx = selected.indexOf(i);
  if (idx >= 0) selected.splice(idx, 1); else selected.push(i);
  var box = document.getElementById('chkbox-' + i);
  if (box) box.className = 'chk-box' + (selected.indexOf(i) >= 0 ? ' on' : '');
  var btn = document.getElementById('make-btn');
  if (btn) btn.disabled = selected.length < 1;
}

function makeGroup() {
  var nameEl = document.getElementById('grp-name');
  var roomName = nameEl ? nameEl.value.trim() : '';
  var memberNames = selected.map(function(i) { return friends[i].name; });
  socket.emit('create_group', { name: roomName, memberNames: memberNames });
}

// --- 프로필 / DM ---
function showProfile(idx) {
  var f = friends[idx];
  if (!f) return;
  activeId = idx;
  renderList();
  var existing = chats.find(function(c) { return c.type === 'dm' && c.friendName === f.name; });
  var lastMsg = existing && existing.messages.length > 0 ? existing.messages[existing.messages.length - 1] : null;
  document.getElementById('main').innerHTML =
    '<div style="height:100%;display:flex;flex-direction:column;">'
    + '<div class="mobile-header"><button class="ib" onclick="goBack()"><i class="ti ti-arrow-left"></i></button><span style="font-size:14px;font-weight:500;color:#222;margin-left:6px;">' + esc(f.name) + '</span></div>'
    + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;">'
    + ufAv(90, '24px', f.photo)
    + '<div style="margin-top:16px;font-size:20px;font-weight:500;color:#222;">' + esc(f.name) + '</div>'
    + '<div style="margin-top:8px;font-size:13px;color:#666;display:flex;align-items:center;gap:6px;"><span class="dot-on"></span><span>온라인</span></div>'
    + '<div style="width:100%;height:0.5px;background:#eee;margin:24px 0;"></div>'
    + (lastMsg ? '<div style="width:100%;background:#f5f5f5;border-radius:10px;padding:12px 16px;margin-bottom:20px;"><div style="font-size:11px;color:#aaa;margin-bottom:6px;">마지막 대화</div><div style="font-size:13px;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (lastMsg.s === 'me' ? '나: ' : esc(f.name) + ': ') + esc(lastMsg.t) + '</div><div style="font-size:11px;color:#aaa;margin-top:4px;">' + lastMsg.time + '</div></div>' : '')
    + '<button onclick="startDM(' + idx + ')" style="width:100%;padding:14px;background:#C84828;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;"><i class="ti ti-message-2" style="font-size:16px;"></i> 1:1 대화하기</button>'
    + '</div></div>';
  enterMobileChat();
}

function showMyProfile() {
  activeId = null;
  renderList();
  var avHtml = me.photo ? '<img src="' + me.photo + '" style="width:100%;height:100%;object-fit:cover;"/>' : UF_SVG;
  document.getElementById('main').innerHTML =
    '<div style="height:100%;display:flex;flex-direction:column;">'
    + '<div class="mobile-header"><button class="ib" onclick="goBack()"><i class="ti ti-arrow-left"></i></button><span style="font-size:14px;font-weight:500;color:#222;margin-left:6px;">내 프로필</span></div>'
    + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;">'
    + '<div class="photo-wrap" onclick="triggerPhotoUpload()"><div style="width:90px;height:90px;border-radius:24px;overflow:hidden;background:#fff;border:0.5px solid #ddd;display:flex;align-items:center;justify-content:center;" id="profile-photo-preview">' + avHtml + '</div><div class="photo-overlay"><i class="ti ti-camera" style="font-size:13px;"></i><span>사진 변경</span></div></div>'
    + '<div style="margin-top:16px;font-size:20px;font-weight:500;color:#222;">' + esc(me.name) + '</div>'
    + '<div style="width:100%;height:0.5px;background:#eee;margin:24px 0;"></div>'
    + '<div style="width:100%;margin-bottom:12px;"><div style="font-size:11px;color:#aaa;margin-bottom:6px;">이름</div><input id="my-name" type="text" value="' + esc(me.name) + '" style="width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#f5f5f5;color:#222;outline:none;"/></div>'
    + '<div style="width:100%;margin-bottom:20px;"><div style="font-size:11px;color:#aaa;margin-bottom:6px;">상태 메시지</div><input id="my-status" type="text" value="' + esc(me.status) + '" style="width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#f5f5f5;color:#222;outline:none;"/></div>'
    + '<button onclick="saveMyProfile()" style="width:100%;padding:14px;background:#C84828;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;">저장하기</button>'
    + '</div></div>';
  enterMobileChat();
}

function triggerPhotoUpload() { document.getElementById('photo-input').click(); }
document.getElementById('photo-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    me.photo = ev.target.result;
    var p = document.getElementById('profile-photo-preview');
    if (p) p.innerHTML = '<img src="' + me.photo + '" style="width:100%;height:100%;object-fit:cover;"/>';
    updateBottomAv();
  };
  reader.readAsDataURL(file);
  this.value = '';
});

function saveMyProfile() {
  var n = document.getElementById('my-name'), s = document.getElementById('my-status');
  if (n) me.name = n.value.trim() || me.name;
  if (s) me.status = s.value.trim();
  document.getElementById('my-name-bar').textContent = me.name;
  document.getElementById('my-status-bar').textContent = me.status || '상태 메시지 설정하기';
  updateBottomAv();
  showEmpty();
}

function startDM(idx) {
  var f = friends[idx];
  if (!f || !socket) return;
  var roomId = 'dm:' + [me.name, f.name].sort().join('___');
  var existing = chats.find(function(c) { return c.roomId === roomId; });
  if (existing) { switchToChat(existing); return; }
  socket.emit('create_dm', { targetName: f.name });
}

function openChat(id) {
  var c = chats.find(function(x) { return x.id === id; });
  if (!c) return;
  activeId = id;
  c.unread = 0;
  renderList();
  renderChat(c);
}

function startRename(cid) {
  renamingId = cid;
  var c = chats.find(function(x) { return x.id === cid; });
  var menu = document.getElementById('more-menu');
  if (menu) menu.classList.remove('open');
  var bar = document.getElementById('rename-bar');
  if (bar) {
    bar.style.display = 'flex';
    var inp = document.getElementById('rename-inp');
    if (inp) { inp.value = c.name; inp.focus(); inp.select(); }
  }
}

function confirmRename() {
  var inp = document.getElementById('rename-inp'), newName = inp && inp.value.trim();
  if (!newName || !renamingId) return;
  var c = chats.find(function(x) { return x.id === renamingId; });
  if (c) c.name = newName;
  renamingId = null;
  var bar = document.getElementById('rename-bar');
  if (bar) bar.style.display = 'none';
  var hn = document.getElementById('chat-hn');
  if (hn) hn.textContent = newName;
  renderList();
}

function leaveChat(cid) {
  var menu = document.getElementById('more-menu');
  if (menu) menu.classList.remove('open');
  var idx = chats.findIndex(function(x) { return x.id === cid; });
  if (idx >= 0) chats.splice(idx, 1);
  activeId = null;
  renderList();
  showEmpty();
}

function renderChat(c) {
  var msgsHtml = '';
  if (c.messages.length === 0) {
    msgsHtml = '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#aaa;">' + chatAv(c, 48, '14px') + '<span style="font-size:13px;font-weight:500;color:#222;margin-top:4px">' + esc(c.name) + '</span><span style="font-size:12px">첫 메시지를 보내보세요 👋</span></div>';
  } else {
    c.messages.forEach(function(msg) {
      if (msg.s === 'sys') { msgsHtml += '<div class="dv">' + esc(msg.t) + '</div>'; return; }
      var isMe = msg.s === 'me';
      var mavHtml = isMe ? '' : '<div class="mav" style="background:#fff;border:0.5px solid rgba(100,160,210,0.4);">' + UF_SVG + '</div>';
      msgsHtml += '<div class="mr' + (isMe ? ' me' : '') + '">' + mavHtml + '<div class="mc">' + (!isMe ? '<span class="sn">' + esc(msg.s) + '</span>' : '') + '<div class="bl">' + esc(msg.t) + '</div><span class="mt">' + msg.time + '</span></div></div>';
    });
  }
  document.getElementById('main').innerHTML =
    '<div style="padding:14px 16px;border-bottom:0.5px solid #eee;display:flex;align-items:center;gap:10px;background:#fff;flex-shrink:0;">'
    + '<button class="ib mobile-back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>'
    + chatAv(c, 34, '10px')
    + '<div style="flex:1"><div id="chat-hn" style="font-size:14px;font-weight:500;color:#222;">' + esc(c.name) + '</div><div style="font-size:11px;color:#888;margin-top:1px;">' + (c.type === 'group' ? (c.members.length + 1) + '명 참여 중' : '1:1 대화') + '</div></div>'
    + '<button class="ib tooltip" data-tip="대화방 이름 변경" onclick="startRename(' + c.id + ')"><i class="ti ti-pencil"></i></button>'
    + '<div class="dropdown"><button class="ib tooltip" id="more-btn" data-tip="더보기" onclick="toggleMoreMenu()"><i class="ti ti-dots-vertical"></i></button>'
    + '<div class="dropdown-menu" id="more-menu">'
    + '<div class="dropdown-item" onclick="alert(\'준비 중!\')"><i class="ti ti-bell" style="color:#5A8AAA;"></i>알림 설정</div>'
    + '<div class="dropdown-divider"></div><div class="dropdown-item danger" onclick="leaveChat(' + c.id + ')"><i class="ti ti-door-exit"></i>대화방 나가기</div></div></div></div>'
    + '<div class="rename-bar" id="rename-bar" style="display:none;"><input id="rename-inp" type="text" placeholder="새 대화방 이름"/><button onclick="confirmRename()">변경</button><button onclick="document.getElementById(\'rename-bar\').style.display=\'none\'" style="padding:7px 10px;border:0.5px solid #ddd;background:transparent;border-radius:8px;font-size:12px;cursor:pointer;color:#888;">취소</button></div>'
    + '<div id="msgs">' + msgsHtml + '</div>'
    + '<div id="inp-area"><button class="ib"><i class="ti ti-plus"></i></button><input id="msg-in" type="text" placeholder="' + esc(c.name) + '에게 메시지 보내기"/><button id="send-btn" onclick="sendMsg()"><i class="ti ti-send"></i></button></div>';
  var msgs = document.getElementById('msgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  var inp = document.getElementById('msg-in');
  if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
  var ri = document.getElementById('rename-inp');
  if (ri) ri.addEventListener('keydown', function(e) { if (e.key === 'Enter') confirmRename(); });
  enterMobileChat();
}

// 모바일 키보드 대응: visualViewport resize 시 앱 높이를 가시 영역에 맞게 조정
// (iOS Safari는 키보드가 올라와도 100dvh가 줄어들지 않아 JS로 보완)
if (window.visualViewport) {
  function onViewportResize() {
    if (window.innerWidth > 768) return;
    var app = document.getElementById('app');
    if (!app) return;
    var h = window.visualViewport.height;
    app.style.height = h + 'px';
    // 키보드가 올라왔을 때 메시지 목록 하단 유지
    var msgs = document.getElementById('msgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }
  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

function sendMsg() {
  var c = chats.find(function(x) { return x.id === activeId; });
  var inp = document.getElementById('msg-in');
  if (!inp || !c || !socket) return;
  var text = inp.value.trim();
  if (!text) return;
  socket.emit('send_message', { roomId: c.roomId, text: text });
  inp.value = '';
}
</script>
</body>
</html>
